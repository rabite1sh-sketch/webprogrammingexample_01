<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
<div style="max-width: 640px; margin: 0 auto; border: 1px solid #ececec; border-radius: 12px; padding: 24px;">
    <h2 style="color: #e67e22; margin-top: 0;">10cm 팬페이지 이메일 인증</h2>
    <p><strong th:text="${email}">user@example.com</strong> 님, 회원가입을 계속하려면 아래 인증을 완료해 주세요.</p>

    <div style="background: #fff7eb; border: 1px solid #ffd9a8; border-radius: 10px; padding: 14px; margin: 14px 0;">
        인증번호: <strong style="font-size: 20px;" th:text="${code}">123456</strong>
    </div>

    <p>또는 아래 버튼으로 이메일 인증을 완료할 수 있습니다.</p>
    <p>
        <a th:href="${verifyLink}"
           style="display: inline-block; background: #27ae60; color: #fff; text-decoration: none; padding: 10px 16px; border-radius: 8px;">이메일 인증 완료하기</a>
    </p>

    <p style="font-size: 13px; color: #666;">버튼이 동작하지 않으면 아래 링크를 복사해서 브라우저에 붙여넣어 주세요.</p>
    <p style="font-size: 13px; color: #444; word-break: break-all;" th:text="${verifyLink}">http://localhost:8080/verify-email?token=...</p>
</div>
</body>
</html>
