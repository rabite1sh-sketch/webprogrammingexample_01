<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>10cm 따뜻한 기부 팬페이지</title>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <style>
        body { background-color: #FAF3E0; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding-bottom: 50px; }
        .top-header { width: 100%; background-color: white; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); box-sizing: border-box; }
        .logo { font-size: 24px; font-weight: bold; color: #E67E22; }
        .login-area input { padding: 5px; margin-right: 5px; border: 1px solid #ddd; border-radius: 4px; }
        .auth-btn { padding: 6px 12px; background-color: #34495e; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .auth-btn:hover { opacity: 0.9; }
        .donation-status { background-color: #E67E22; color: white; padding: 20px 40px; border-radius: 50px; font-size: 20px; font-weight: bold; margin-top: 30px; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3); }
        .intro-section { text-align: center; margin: 40px 20px 30px 20px; color: #555; line-height: 1.8; }
        
        .item-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 900px; margin-bottom: 40px; }
        .item-card { background-color: white; border-radius: 10px; padding: 20px; width: 200px; text-align: center; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); transition: 0.3s; position: relative; }
        .item-card:hover { transform: translateY(-5px); }
        .item-image { width: 80px; height: 80px; object-fit: cover; margin-bottom: 15px; border-radius: 10px; }
        .donate-btn { padding: 10px 20px; background-color: #8E44AD; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .tmi-container { background-color: white; border: 2px dashed #F39C12; border-radius: 15px; padding: 20px; width: 80%; max-width: 800px; text-align: center; margin-bottom: 40px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); }
        .tmi-title { font-size: 18px; font-weight: bold; color: #D35400; margin-bottom: 10px; }
        .tmi-text { font-size: 16px; color: #555; margin-bottom: 15px; min-height: 24px; }
        .tmi-btn { padding: 6px 15px; background-color: #F39C12; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .board-container { background-color: white; padding: 30px; border-radius: 15px; width: 80%; max-width: 800px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); }
        .input-area { display: flex; gap: 10px; margin-bottom: 30px; align-items: center; }
        .message-input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .submit-btn { padding: 10px 20px; background-color: #27AE60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .login-prompt { text-align: center; padding: 20px; background-color: #f1f2f6; color: #747d8c; border-radius: 8px; margin-bottom: 30px; }
        .comment-box { background-color: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; border-left: 5px solid #E67E22; }
        .comment-name { font-weight: bold; color: #E67E22; }
        .comment-time { font-size: 12px; color: #999; margin-left: 10px; }
        .delete-btn { position: absolute; top: 15px; right: 15px; background-color: #ff7675; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="logo">for 센치너</div>
        <div class="login-area" id="auth-section">
            <div id="login-form">
                <input type="text" id="userid" placeholder="아이디" style="width: 80px;">
                <input type="password" id="userpw" placeholder="비밀번호" style="width: 80px;">
                <button class="auth-btn" onclick="login()">로그인</button>
                <button class="auth-btn" style="background-color: #27ae60;" onclick="toggleSignup()">회원가입</button>
            </div>
            
            <div id="signup-form" style="display: none; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: absolute; right: 50px; top: 60px; z-index: 10;">
                <h3 style="margin-top: 0; color: #E67E22;">회원가입</h3>
                <div id="step-1-email">
                    <input type="text" id="reg-email" placeholder="이메일 주소" style="padding: 5px; width: 140px;">
                    <button class="auth-btn" style="background-color: #3498db;" onclick="sendVerification()">인증번호 받기</button>
                    <div id="verify-area" style="display: none; margin-top: 10px;">
                        <input type="text" id="reg-code" placeholder="인증번호 6자리" style="padding: 5px; width: 100px;">
                        <button class="auth-btn" style="background-color: #2ecc71;" onclick="verifyCode()">인증 확인</button>
                    </div>
                </div>
                <div id="step-2-details" style="display: none; margin-top: 15px; flex-direction: column; gap: 8px;">
                    <input type="text" id="reg-id" placeholder="사용할 아이디" style="padding: 5px;">
                    <input type="password" id="reg-pw" placeholder="비밀번호" style="padding: 5px;">
                    <input type="text" id="reg-name" placeholder="닉네임" style="padding: 5px;">
                    <button class="auth-btn" style="background-color: #9b59b6; width: 100%; margin-top: 5px;" onclick="signup()">최종 가입하기</button>
                </div>
                <button class="auth-btn" style="background-color: #7f8c8d; width: 100%; margin-top: 10px;" onclick="toggleSignup()">닫기</button>
            </div>

            <div id="user-profile" style="display: none;">
                <span id="welcome-name" style="font-weight: bold; color: #E67E22; margin-right: 10px;"></span>
                <button class="auth-btn" onclick="logout()">로그아웃</button>
                <button class="auth-btn" style="background-color: #c0392b; margin-left: 5px;" onclick="withdrawAccount()">회원탈퇴</button>
            </div>
        </div>
    </div>

    <div class="donation-status">
        현재까지 모인 따뜻한 마음: <span id="total-amount">0</span>원
    </div>

    <div id="admin-excel-area" style="text-align: center; margin-top: 15px; display: none;">
        <a th:href="@{/excel/download}" class="auth-btn" style="background-color: #2E86C1; text-decoration: none; display: inline-block; margin-right: 10px;">
            📊 기부 내역 엑셀 다운로드
        </a>
    </div>

    <div class="intro-section">
        <div style="font-size: 24px; font-weight: bold; color: #D35400;">10cm와 함께하는 기부 챌린지 🌼</div>
        <p>원하는 항목을 클릭하여 기부에 동참해 보세요!</p>
    </div>

    <div id="admin-add-item-area" style="text-align: center; margin-bottom: 20px; display: none;">
        <button class="auth-btn" style="background-color: #27AE60; font-weight: bold; padding: 10px 20px;" onclick="addNewItem()">➕ 새 기부 품목 추가하기</button>
    </div>

    <div class="item-container" id="item-list"></div>

    <div class="tmi-container">
        <div class="tmi-title">💡 10cm 오늘의 TMI</div>
        <div class="tmi-text" id="tmi-content">여기에 TMI가 나타납니다.</div>
        <button class="tmi-btn" onclick="showRandomTMI()">다른 TMI 보기 🔄</button>
    </div>

    <div class="board-container">
        <div style="font-size: 20px; font-weight: bold; margin-bottom: 20px;">💬 응원 메시지</div>
        
        <div id="login-prompt" class="login-prompt">
            따뜻한 응원을 남기려면 로그인을 해주세요.
        </div>

        <div id="comment-input-area" class="input-area" style="display: none;">
            <div id="writer-name" style="font-weight: bold; padding: 0 10px;">손님</div>
            <input type="text" id="msg" class="message-input" placeholder="로그인 후 남길 수 있습니다.">
            <button id="btn" class="submit-btn">남기기</button>
        </div>

        <div id="comment-list"></div>
    </div>

    <script>
        const SERVER_URL = '';
        let currentUser = null;
        let isEmailVerified = false;

        const tmiList = [
            "10cm라는 이름은 원래 두 멤버의 키 차이가 10cm라서 지어졌어요!",
            "권정열은 연세대학교 교육학과 출신으로, 원래 선생님이 될 뻔 했답니다.",
            "권정열의 생일은 삼일절(3월 1일)입니다. 🇰🇷",
            "트레이드마크인 동그란 뿔테 안경은 알이 없는 경우가 많습니다.",
            "무명 시절에는 홍대 거리에서 버스킹을 정말 많이 했었어요.",
            "히트곡 '아메리카노' 덕분에 실제로 커피 광고를 찍기도 했죠! ☕",
            "권정열은 원래 '해령'이라는 락 밴드의 보컬 출신이었다는 사실 🎸",
            "콘서트에서 관객들과 밀당하는 멘트 장인으로 유명합니다."
        ];

        function showRandomTMI() {
            const randomIndex = Math.floor(Math.random() * tmiList.length);
            document.getElementById('tmi-content').innerText = tmiList[randomIndex];
        }

        async function init() {
            const savedUser = localStorage.getItem('fanpage_user');
            if (savedUser) currentUser = JSON.parse(savedUser);
            updateUI();
            
            loadItems(); 
            loadComments();
            loadDonation();
            showRandomTMI(); 
        }

        async function loadItems() {
            try {
                const res = await fetch(`${SERVER_URL}/items`);
                if (!res.ok) throw new Error("서버에서 아이템을 가져올 수 없습니다.");
                
                const items = await res.json();
                const itemListDiv = document.getElementById('item-list');
                itemListDiv.innerHTML = ''; 

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'item-card';

                    let adminButtons = '';
                    if (currentUser && currentUser.id === 'admin') {
                        adminButtons = `
                            <div style="margin-top: 15px; border-top: 1px dashed #ddd; padding-top: 10px;">
                                <button onclick="editItem(${item.id}, '${item.name}', ${item.price})" style="background:#F39C12; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer; font-size: 12px; margin-right: 5px;">수정</button>
                                <button onclick="deleteItem(${item.id})" style="background:#E74C3C; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer; font-size: 12px;">삭제</button>
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        <img src="${SERVER_URL}/images/${item.imageUrl}" class="item-image" alt="${item.name}" onerror="this.src='https://dummyimage.com/80x80/cccccc/000000.png&text=No+Image'">
                        <div style="font-weight: bold;">${item.name}</div>
                        <div style="color: #E67E22; margin: 10px 0;">${item.price.toLocaleString()}원</div>
                        <button class="donate-btn" onclick="donate(${item.price})">기부하기</button>
                        ${adminButtons}
                    `;
                    itemListDiv.appendChild(card);
                });
            } catch(e) { 
                console.error("기부 물품 로드 실패:", e); 
            }
        }

        async function addNewItem() {
            const name = prompt("추가할 기부 품목의 이름을 입력하세요:");
            if (!name) return;
            const price = prompt("가격을 입력하세요 (숫자만):");
            if (!price || isNaN(price)) return alert("올바른 숫자를 입력해주세요.");
            const imageUrl = prompt("이미지 파일명을 입력하세요 (서버에 미리 저장된 파일명, 예: new_item.jpg)\n*입력하지 않으면 기본 이미지가 들어갑니다.", "default.jpg");

            try {
                const res = await fetch(`${SERVER_URL}/items`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, price: parseInt(price), imageUrl: imageUrl || 'default.jpg' })
                });
                if (res.ok) {
                    alert("새 품목이 추가되었습니다!");
                    loadItems(); 
                } else {
                    alert("품목 추가 실패!");
                }
            } catch (e) { console.error(e); }
        }

        async function editItem(id, currentName, currentPrice) {
            const newName = prompt("새로운 품목 이름을 입력하세요:", currentName);
            if (!newName) return; 
            
            const newPrice = prompt("새로운 가격(수량)을 입력하세요:", currentPrice);
            if (!newPrice || isNaN(newPrice)) return alert("올바른 숫자를 입력해주세요.");

            try {
                const res = await fetch(`${SERVER_URL}/items/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName, price: parseInt(newPrice) })
                });
                
                if (res.ok) {
                    alert("수정되었습니다!");
                    loadItems(); 
                } else {
                    alert("수정 실패!");
                }
            } catch (e) { console.error(e); }
        }

        async function deleteItem(id) {
            if (!confirm("정말 이 품목을 삭제하시겠습니까?")) return;

            try {
                const res = await fetch(`${SERVER_URL}/items/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert("삭제되었습니다.");
                    loadItems();
                } else {
                    alert("삭제 실패!");
                }
            } catch (e) { console.error(e); }
        }

        function toggleSignup() {
            const signupForm = document.getElementById('signup-form');
            signupForm.style.display = signupForm.style.display === 'none' ? 'block' : 'none';
        }

        async function sendVerification() {
            const email = document.getElementById('reg-email').value;
            if (!email.includes('@')) return alert("올바른 이메일 주소를 입력해주세요.");
            alert("인증번호를 발송 중입니다. 잠시만 기다려주세요...");
            try {
                const res = await fetch(`${SERVER_URL}/send-verification`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
                const data = await res.json();
                if (data.success) { alert(data.message); document.getElementById('verify-area').style.display = 'block'; } 
                else { alert(data.message); }
            } catch(e) { alert("서버 연결 실패!"); }
        }

        async function verifyCode() {
            const email = document.getElementById('reg-email').value;
            const code = document.getElementById('reg-code').value;
            try {
                const res = await fetch(`${SERVER_URL}/verify-code`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, code }) });
                const data = await res.json();
                if (data.success) {
                    alert("인증이 완료되었습니다!"); isEmailVerified = true;
                    document.getElementById('step-1-email').style.display = 'none';
                    document.getElementById('step-2-details').style.display = 'flex';
                } else { alert(data.message); }
            } catch(e) { alert("서버 연결 실패!"); }
        }

        async function signup() {
            if (!isEmailVerified) return alert("이메일 인증을 먼저 진행해주세요.");
            const email = document.getElementById('reg-email').value;
            const id = document.getElementById('reg-id').value;
            const pw = document.getElementById('reg-pw').value;
            const name = document.getElementById('reg-name').value;
            if (!id || !pw || !name) return alert("정보를 모두 입력해주세요.");

            const res = await fetch(`${SERVER_URL}/signup`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, password: pw, name, email }) });
            const data = await res.json();
            if (data.success) {
                alert("회원가입 완료! 로그인 해주세요.");
                toggleSignup();
                document.getElementById('step-1-email').style.display = 'block';
                document.getElementById('verify-area').style.display = 'none';
                document.getElementById('step-2-details').style.display = 'none';
                isEmailVerified = false;
            } else { alert(data.message); }
        }

        async function login() {
            const id = document.getElementById('userid').value;
            const pw = document.getElementById('userpw').value;
            if (!id || !pw) return alert("아이디와 비밀번호를 입력해주세요.");

            try {
                const res = await fetch(`${SERVER_URL}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, password: pw }) });
                const data = await res.json();
                
                if (data.success) { 
                    localStorage.setItem('fanpage_token', data.token);
                    localStorage.setItem('fanpage_user', JSON.stringify(data.user));
                    currentUser = data.user; 
                    updateUI(); 
                    loadItems(); 
                    loadComments(); 
                    alert("로그인 성공!");
                } else { 
                    alert(data.message); 
                }
            } catch (error) {
                console.error("로그인 에러:", error);
                alert("서버와 연결할 수 없습니다. 서버가 켜져 있는지 확인해주세요.");
            }
        }

        function logout() { 
            localStorage.removeItem('fanpage_token');
            localStorage.removeItem('fanpage_user');
            currentUser = null; 
            updateUI(); 
            loadItems(); 
            loadComments(); 
            alert("로그아웃 되었습니다.");
        }

        // 🔥 회원 탈퇴 스크립트 추가
        async function withdrawAccount() {
            if (!currentUser) return;
            const isConfirmed = confirm("정말로 탈퇴하시겠습니까?\n작성하신 기부 내역 및 데이터가 함께 삭제되며 복구할 수 없습니다.");
            if (!isConfirmed) return;

            const token = localStorage.getItem("fanpage_token");

            try {
                const response = await fetch(`${SERVER_URL}/users/${currentUser.id}`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": `Bearer ${token}` 
                    }
                });

                const result = await response.json();

                if (result.success) {
                    alert(result.message);
                    logout(); // 로그아웃 함수 호출해서 화면 초기화 및 로컬스토리지 비우기
                } else {
                    alert("탈퇴 실패: " + result.message);
                }
            } catch (error) {
                console.error("탈퇴 에러:", error);
                alert("서버와 통신 중 문제가 발생했습니다.");
            }
        }

        function updateUI() {
            if (currentUser) {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('welcome-name').innerText = currentUser.name;
                document.getElementById('login-prompt').style.display = 'none';
                document.getElementById('comment-input-area').style.display = 'flex';
                document.getElementById('writer-name').innerText = currentUser.name;
                document.getElementById('msg').placeholder = "응원을 남겨주세요!";
                document.getElementById('signup-form').style.display = 'none';
                
                if (currentUser.id === 'admin') {
                    document.getElementById('admin-excel-area').style.display = 'block';
                    document.getElementById('admin-add-item-area').style.display = 'block';
                } else {
                    document.getElementById('admin-excel-area').style.display = 'none';
                    document.getElementById('admin-add-item-area').style.display = 'none';
                }
            } else {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('user-profile').style.display = 'none';
                document.getElementById('userid').value = '';
                document.getElementById('userpw').value = '';
                document.getElementById('login-prompt').style.display = 'block';
                document.getElementById('comment-input-area').style.display = 'none';
                document.getElementById('writer-name').innerText = "손님";
                document.getElementById('msg').placeholder = "로그인 후 남길 수 있습니다.";
                document.getElementById('admin-excel-area').style.display = 'none'; 
                document.getElementById('admin-add-item-area').style.display = 'none';
            }
        }

        async function loadDonation() {
            try {
                const res = await fetch(`${SERVER_URL}/donation`);
                const data = await res.json();
                document.getElementById('total-amount').innerText = data.total_amount.toLocaleString();
            } catch(e) { console.log("기부 금액 로드 실패"); }
        }

 async function donate(amount) {
    if (!currentUser) return alert("로그인부터 진행해주세요.");
    
    try {
        const response = await PortOne.requestPayment({
            storeId: "store-868eb069-58f8-4e2c-9b85-dd456e7d5bf2",
            channelKey: "channel-key-76312e47-57bd-4548-8f5b-af34a0988ac8",
            paymentId: "order_" + new Date().getTime(),
            orderName: "10cm 팬페이지 기부", 
            totalAmount: amount, 
            currency: "KRW",
            payMethod: "EASY_PAY" 
        });
        
        if (response.code != null) return alert("결제 실패 또는 취소: " + response.message);

        const token = localStorage.getItem('fanpage_token');

        // 서버에 데이터 전송
        const donateRes = await fetch(`${SERVER_URL}/donate`, { 
            method: 'POST', 
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}` 
            }, 
            body: JSON.stringify({ amount: amount, user_id: currentUser.id }) 
        });

        // ⭐️ 핵심 수정: 서버가 제대로 응답했는지(HTTP 상태코드) 먼저 확인
        if (!donateRes.ok) {
            throw new Error(`서버 통신 실패: 상태 코드 ${donateRes.status}`);
        }

        // ⭐️ 핵심 수정: 서버의 응답 데이터를 뜯어보고 '진짜' 성공했을 때만 처리
        const result = await donateRes.json();

        if (result.success === true) {
            alert(`결제가 완료되었습니다! ${amount.toLocaleString()}원이 기부되었습니다. 감사합니다! 🌼`);
            await loadDonation(); // 진짜로 저장되었으니 금액 다시 불러오기
        } else {
            // 서버에서 문제가 생겼다면 (예: 유저 없음)
            alert("기부 처리 실패: " + result.message);
        }

    } catch (error) {
        console.error("결제/저장 과정 에러:", error);
        alert("기부 처리 중 오류가 발생했습니다. 브라우저 콘솔(F12)을 확인해주세요.");
    }
}
    
async function loadComments() {
    try {
        const res = await fetch(`${SERVER_URL}/comments`);
        if (!res.ok) throw new Error("댓글을 불러올 수 없습니다.");
        
        const comments = await res.json();
        const list = document.getElementById('comment-list');
        
        // 1. ⭐️ 중요: 새로 그리기 전에 기존에 있던 댓글들을 싹 비웁니다. (중복 방지)
        list.innerHTML = ''; 

        comments.forEach(c => {
            const div = document.createElement('div');
            div.className = 'comment-box';
            
            // 2. 작성자 ID 판별 (서버 데이터 구조가 달라도 대응 가능하도록)
            const writerId = c.userId || c.user_id || (c.user ? c.user.id : null);
            
            // 3. 삭제 버튼 생성 로직 (내가 쓴 글이거나 관리자일 때만)
            let deleteBtnHtml = '';
            if (currentUser && (currentUser.id === writerId || currentUser.id === 'admin')) {
                // 버튼 태그가 문자열로 정확히 들어가도록 작성
                deleteBtnHtml = `<button class="delete-btn" onclick="deleteComment(${c.id})">삭제</button>`;
            }
            
            // 4. 댓글 박스 내부 구성
            div.innerHTML = `
                <div class="comment-name">
                    ${c.name} <span class="comment-time">${c.time}</span>
                </div>
                <div style="margin-top:5px;">${c.text}</div>
                ${deleteBtnHtml} 
            `;
            
            list.appendChild(div);
        });
    } catch(e) { 
        console.error("댓글 로드 실패:", e); 
    }
}
        async function deleteComment(id) {
            if (!confirm("정말 이 댓글을 삭제하시겠습니까?")) return;
            const res = await fetch(`${SERVER_URL}/comments/${id}?user_id=${currentUser.id}`, { method: 'DELETE' });
            if (res.status === 200) loadComments();
            else alert("삭제 실패");
        }

        document.getElementById('btn').addEventListener('click', async function() {
            if (!currentUser) return alert("로그인부터 진행해주세요.");
            const text = document.getElementById('msg').value;
            if (!text) return alert("내용을 입력해주세요!");
            const token = localStorage.getItem('fanpage_token');

            try {
                await fetch(`${SERVER_URL}/comments`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ userId: currentUser.id, name: currentUser.name, time: new Date().toLocaleString(), text })
                });
                document.getElementById('msg').value = '';
                loadComments();
            } catch(e) { alert("댓글 등록 중 오류가 발생했습니다."); }
        });

        document.getElementById('userpw').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        init();
    </script>
