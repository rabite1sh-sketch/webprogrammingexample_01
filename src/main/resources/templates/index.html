<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10cm 따뜻한 기부 팬페이지</title>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
<header class="top-header">
    <h1 class="logo">for 센치너</h1>

    <section class="auth-area" aria-label="인증 영역">
        <form id="login-form" class="inline-form">
            <input id="userid" type="text" placeholder="아이디" required>
            <input id="userpw" type="password" placeholder="비밀번호" required>
            <button type="submit" class="btn btn-dark">로그인</button>
            <button type="button" id="toggle-signup-btn" class="btn btn-green">회원가입</button>
        </form>

        <div id="user-profile" class="user-profile hidden">
            <strong id="welcome-name"></strong>님 환영합니다.
            <button type="button" id="logout-btn" class="btn btn-dark">로그아웃</button>
            <button type="button" id="withdraw-btn" class="btn btn-red">회원탈퇴</button>
        </div>

        <form id="signup-form" class="signup-form hidden">
            <h2>회원가입</h2>
            <div class="signup-step">
                <input id="reg-email" type="email" placeholder="이메일 주소" required>
                <button type="button" id="send-verify-btn" class="btn btn-blue">인증번호 받기</button>
            </div>
            <div id="verify-area" class="signup-step hidden">
                <input id="reg-code" type="text" placeholder="인증번호 6자리">
                <button type="button" id="verify-code-btn" class="btn btn-green">인증 확인</button>
            </div>
            <div id="signup-details" class="signup-details hidden">
                <input id="reg-id" type="text" placeholder="사용할 아이디" required>
                <input id="reg-pw" type="password" placeholder="비밀번호" required>
                <input id="reg-name" type="text" placeholder="닉네임" required>
                <button type="submit" class="btn btn-purple">최종 가입</button>
            </div>
        </form>
    </section>
</header>

<main class="container">
    <section class="donation-status">총 누적 기부금: <span id="total-amount">0</span>원</section>

    <section class="intro-section">
        <p>10cm를 사랑하는 팬들이 함께 따뜻함을 모으는 공간입니다.</p>
        <p>아이템 기부와 응원 메시지로 함께해 주세요.</p>
    </section>

    <section>
        <div class="section-title-wrap">
            <h2>기부 아이템</h2>
            <button id="add-item-btn" class="btn btn-orange hidden" type="button">관리자: 품목 추가</button>
        </div>

        <div id="item-list" class="item-container" aria-label="기부 상세 품목 바로가기">
            <article class="item-card" th:each="item : ${items}">
                <a th:href="@{/item/{id}(id=${item.id})}">
                    <img class="item-image"
                         th:if="${item.imageUrl != null and !#strings.isEmpty(item.imageUrl)}"
                         th:src="@{'/images/' + ${item.imageUrl}}"
                         src="/images/donate_item1.svg"
                         th:alt="${item.title}">
                </a>
                <h3 th:text="${item.title}">기부 아이템 제목</h3>
                <p th:text="${item.content}">기부 아이템 설명</p>
                <p><strong th:text="${#numbers.formatInteger(item.price, 0, 'COMMA') + '원'}">0원</strong></p>
                <div class="card-actions">
                    <a class="btn btn-orange" th:href="@{/item/{id}(id=${item.id})}">자세히 보기</a>
                </div>
            </article>
        </div>

        <p th:if="${#lists.isEmpty(items)}">등록된 기부 아이템이 없습니다.</p>
    </section>

    <section class="tmi-container">
        <h2 class="tmi-title">오늘의 10cm TMI</h2>
        <p id="tmi-text" class="tmi-text"></p>
        <button id="next-tmi-btn" class="btn btn-orange" type="button">다음 TMI 보기</button>
    </section>

    <section class="board-container">
        <h2>응원 메시지 게시판</h2>
        <div id="login-prompt" class="login-prompt">로그인 후 댓글을 작성할 수 있습니다.</div>
        <form id="comment-form" class="input-area hidden">
            <span id="writer-name">손님</span>
            <input id="msg" class="message-input" type="text" placeholder="응원을 남겨주세요!" required>
            <button type="submit" class="btn btn-green">등록</button>
        </form>
        <div id="comment-list"></div>
    </section>

    <section id="admin-excel-area" class="admin-tools hidden">
        <h2>관리자 기능</h2>
        <a class="btn btn-dark" th:href="@{/excel/download}" href="/excel/download">기부 내역 엑셀 다운로드</a>
    </section>
</main>

<script type="module" th:src="@{/js/controller/appController.js}" src="/js/controller/appController.js"></script>
</body>
</html>
